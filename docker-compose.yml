version: '3.8'

services:
  db:
    image: postgres:16
    container_name: ids_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wids-network
  redis:
    image: redis:7
    container_name: ids_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wids-network

  backend:
    build:
      context: ./backend      
      dockerfile: Dockerfile  
    container_name: ids_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app     
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app 
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wids-network
    command: sh -c "sleep 5 && alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ./backend      
      dockerfile: Dockerfile
    container_name: ids_worker
    restart: always
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app 
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wids-network
    command: python src/worker.py
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ids_frontend
    ports:
      - "5173:80" # Nginx running inside on 80, mapped to 5173
    restart: always
    networks:
      - wids-network

networks:
  wids-network:
    driver: bridge

volumes:
  postgres_data: