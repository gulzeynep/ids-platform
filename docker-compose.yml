version: "3.9"

services:
  db:
    image: postgres:16
    container_name: ids_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-12345}
      POSTGRES_DB: ids_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ids_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: ids_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ids_backend
    restart: always
    command: /bin/bash ./start.sh
    ports:
      - "8000:8000"
    expose:
      - "8000"
    volumes:
      - ./backend:/app
      - ./snort/logs:/var/log/snort
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ids_worker
    restart: always
    command: python src/worker.py
    volumes:
      - ./backend:/app
      - ./snort/logs:/var/log/snort
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy



  reverse-proxy:
    image: nginx:latest
    container_name: ids-gateway
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - backend

  secure-engine:
    build:
      context: .
      dockerfile: Dockerfile.snort
    container_name: secure-engine
    restart: always
    network_mode: "service:reverse-proxy"
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    volumes:
      - ./snort/etc:/etc/snort/etc
      - ./snort/rules:/etc/snort/rules
      - ./snort/logs:/var/log/snort
    working_dir: /etc/snort/etc
    environment:
      - INTERFACE=eth0
    command:
      - sh
      - -c
      - |
        /usr/local/bin/snort \
          -c /etc/snort/etc/snort.lua \
          -i eth0 \
          -l /var/log/snort \
          -k none \
          -A alert_json \
          --daq pcap
    depends_on:
      - reverse-proxy

  snort-bridge:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ids_snort_bridge
    restart: always
    command: python -u snort_bridge.py
    volumes:
      - ./backend:/app
      - ./snort/logs:/var/log/snort:ro
    env_file:
      - .env
    depends_on:
      - backend

volumes:
  postgres_data:
