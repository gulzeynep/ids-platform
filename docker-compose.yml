services:
  db:
    image: postgres:16
    container_name: ids_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "12345"
      POSTGRES_DB: ids_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ids_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wids-network

  redis:
    image: redis:7
    container_name: ids_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wids-network

  backend:
    build:
      context: ./backend      
      dockerfile: Dockerfile  
    container_name: ids_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app     
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app  # PYTHON'A ANA DİZİNİ GÖSTERİYORUZ
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wids-network
    command: sh -c "sleep 5 && alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ./backend      
      dockerfile: Dockerfile
    container_name: ids_worker
    restart: always
    environment:
      - PYTHONPATH=/app  # PYTHON'A ANA DİZİNİ GÖSTERİYORUZ
    command: python src/worker.py 
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wids-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ids_frontend
    ports:
      - "5173:80" # Nginx 80'de çalışır, biz 5173'ten erişiriz
    restart: always
    networks:
      - wids-network

networks:
  wids-network:
    driver: bridge

volumes:
  postgres_data: