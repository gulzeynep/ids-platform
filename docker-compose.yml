services:
  db:
    image: postgres:16
    container_name: ids_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-12345}
      POSTGRES_DB: ids_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ids_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: ids_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ids_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./snort/logs:/var/log/snort
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ids_worker
    restart: always
    command: python src/worker.py
    volumes:
      - ./backend:/app
      - ./snort/logs:/var/log/snort
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  snort3:
    build:
      context: .
      dockerfile: Dockerfile.snort
    container_name: secure-engine
    restart: always
    network_mode: "service:backend"
    stdin_open: true
    tty: true
    volumes:
      - ./snort/etc:/etc/snort/etc
      - ./snort/rules:/etc/snort/rules
      - ./snort/logs:/var/log/snort
    working_dir: /etc/snort/etc
    cap_add:
      - NET_ADMIN
      - SYS_NICE
    depends_on:
      - backend
    # Çakışmayı önlemek için baştaki "snort" kelimesi silindi
    command: ["-c", "snort.lua", "-i", "eth0", "-l", "/var/log/snort", "-k", "none"]

volumes:
  postgres_data: {}